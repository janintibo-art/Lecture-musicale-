name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Decompresser et construire
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du repo
        uses: actions/checkout@v4

      - name: Localiser et decompresser le ZIP du projet
        run: |
          set -e
          ZIP_FILE=$(find . -maxdepth 2 -type f \( -iname "tibo*.zip" -o -iname "*tibo-android*.zip" -o -iname "LeSonDuTibo*.zip" \) | head -1)
          if [ -z "$ZIP_FILE" ]; then
            echo "Aucun ZIP trouve. Attendu : tibo-android.zip a la racine du repo."
            echo "Contenu du repo :"
            ls -la
            exit 1
          fi
          echo "ZIP trouve : $ZIP_FILE"
          echo "Decompression a la racine..."
          unzip -o "$ZIP_FILE" -d .
          echo ""
          echo "Arborescence apres decompression :"
          ls -la
          echo ""
          echo "Verification de la structure Android :"
          test -f settings.gradle && echo "  OK settings.gradle"
          test -f build.gradle && echo "  OK build.gradle"
          test -f app/build.gradle && echo "  OK app/build.gradle"
          test -f app/src/main/AndroidManifest.xml && echo "  OK AndroidManifest.xml"
          test -f app/src/main/assets/index.html && echo "  OK assets/index.html ($(du -h app/src/main/assets/index.html | cut -f1))"

      - name: Java 17 Temurin
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generer le wrapper Gradle
        run: gradle wrapper --gradle-version 8.5

      - name: Build APK Debug
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build APK Release non-signe
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        continue-on-error: true

      - name: Upload APK Debug
        uses: actions/upload-artifact@v4
        with:
          name: LeSonDuTibo-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 90

      - name: Upload APK Release non-signe
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: LeSonDuTibo-release-apk-unsigned
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 90

      - name: Creer une Release GitHub sur tag v
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          generate_release_notes: true
          name: Le son du Tibo ${{ github.ref_name }}
          body: |
            Le son du Tibo - APK Android.
            Telechargez app-debug.apk ou app-release-unsigned.apk
            puis installez sur votre telephone (autoriser les sources inconnues si demande).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
