name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Decompresser, patcher, construire
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du repo
        uses: actions/checkout@v4

      - name: Localiser et decompresser le ZIP du projet
        run: |
          set -e
          ZIP_FILE=$(find . -maxdepth 2 -type f \( -iname "tibo*.zip" -o -iname "*tibo-android*.zip" -o -iname "LeSonDuTibo*.zip" \) | head -1)
          if [ -z "$ZIP_FILE" ]; then
            echo "Aucun ZIP trouve."
            ls -la
            exit 1
          fi
          unzip -o "$ZIP_FILE" -d .

      - name: Auto-patch HTML pour corriger le scroll WebView
        run: |
          python3 << 'PYEOF'
          import re
          path = 'app/src/main/assets/index.html'
          with open(path, 'r', encoding='utf-8') as f:
              html = f.read()

          # 1. Strip toute touch-action de html,body
          html = re.sub(r'(html\s*,\s*body\s*\{[^}]*?)touch-action\s*:\s*[^;}]+;?', r'\1', html)
          html = re.sub(r'\*\s*\{[^}]*touch-action\s*:[^}]*\}', '', html)

          # 2. Strip user-scalable=no et maximum-scale qui peuvent conflicter
          html = re.sub(r',\s*maximum-scale\s*=\s*[\d.]+', '', html)
          html = re.sub(r',\s*user-scalable\s*=\s*\w+', '', html)

          # 3. Strip overscroll-behavior:none qui peut bloquer le scroll dans certaines WebView
          html = re.sub(r'overscroll-behavior\s*:\s*none\s*;?', '', html)

          # 4. Strip overflow:hidden sur containers principaux (sauf modales)
          # On garde overflow:hidden sur .modal-bg, .modal, .alarm-notif, .night-screen
          # mais on retire sur main-wrap, panel, tab-content, body
          html = re.sub(
              r'(\.(main-wrap|tab-content|panel|app-container)\s*\{[^}]*?)overflow\s*:\s*hidden\s*;?',
              r'\1',
              html
          )

          # 5. Override CSS final (avant </style>)
          css_override = """
          /* ===== FORCE SCROLL â€” workflow injection ===== */
          html { touch-action:auto !important; overflow-y:auto !important; overflow-x:hidden !important; height:auto !important; -webkit-overflow-scrolling:touch !important; }
          body { touch-action:auto !important; overflow-y:visible !important; overflow-x:hidden !important; height:auto !important; min-height:100vh; position:static !important; }
          .main-wrap, .tab-content, .panel, [class*="panel"]:not(.modal):not(.alarm-notif):not(.night-screen) {
            touch-action:auto !important; overflow:visible !important; height:auto !important; max-height:none !important;
          }
          button, .tab, .radio-card, .alarm-row, .preset-btn, .ctrl-btn, .ab-btn { touch-action:manipulation; }
          input, textarea, select { touch-action:auto !important; user-select:text; }
          """
          if '</style>' in html:
              html = html.replace('</style>', css_override + '\n</style>', 1)

          # 6. JS runtime qui force le scroll aprÃ¨s chargement (filet de secours)
          js_fix = """
          <script>
          (function(){
            function forceScroll(){
              try{
                var de=document.documentElement, b=document.body;
                de.style.setProperty('touch-action','auto','important');
                de.style.setProperty('overflow-y','auto','important');
                de.style.setProperty('overflow-x','hidden','important');
                de.style.setProperty('height','auto','important');
                b.style.setProperty('touch-action','auto','important');
                b.style.setProperty('overflow-y','visible','important');
                b.style.setProperty('overflow-x','hidden','important');
                b.style.setProperty('height','auto','important');
                b.style.setProperty('min-height','100vh','important');
                b.style.setProperty('position','static','important');
                // Cherche tout conteneur racine bloquant le scroll
                document.querySelectorAll('.main-wrap,.tab-content,.panel,[class*="panel"]').forEach(function(el){
                  if(el.classList.contains('modal')||el.classList.contains('alarm-notif')||el.classList.contains('night-screen'))return;
                  el.style.setProperty('overflow','visible','important');
                  el.style.setProperty('max-height','none','important');
                  el.style.setProperty('height','auto','important');
                  el.style.setProperty('touch-action','auto','important');
                });
                // Court-circuite tout preventDefault sur touchmove qui empecherait le scroll
                document.addEventListener('touchmove',function(e){/* ne fait rien, laisse passer */},{passive:true,capture:false});
              }catch(e){console.warn('forceScroll',e)}
            }
            forceScroll();
            if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',forceScroll);
            window.addEventListener('load',forceScroll);
            setTimeout(forceScroll,500);
            setTimeout(forceScroll,1500);
            setTimeout(forceScroll,3000);
          })();
          </script>
          """
          # Injecte juste avant </body>
          html = html.replace('</body>', js_fix + '\n</body>', 1)

          with open(path, 'w', encoding='utf-8') as f:
              f.write(html)
          print("HTML patche : CSS strip + override + JS runtime injectes")
          PYEOF

      - name: Java 17 Temurin
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generer le wrapper Gradle
        run: gradle wrapper --gradle-version 8.5

      - name: Build APK Debug
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build APK Release non-signe
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        continue-on-error: true

      - name: Upload APK Debug
        uses: actions/upload-artifact@v4
        with:
          name: LeSonDuTibo-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 90

      - name: Upload APK Release non-signe
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: LeSonDuTibo-release-apk-unsigned
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 90

      - name: Creer une Release GitHub sur tag v
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          generate_release_notes: true
          name: Le son du Tibo ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
